<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>政策连桥</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="政策连桥">
      <img
        class="background-mark"
        src="../policy-link/assets/素材/file-20260710225112695.jpg"
        alt=""
        aria-hidden="true"
      />

      <header class="top-bar">
        <h1>政策连桥</h1>
        <div class="status-panel" aria-label="游戏状态">
          <div class="counter" id="counter" aria-live="polite">0/5</div>
          <button class="reset-button" id="resetButton" type="button">重玩</button>
        </div>
      </header>

      <p class="game-tip">左边选政策，右边选适合对象；也可按住左侧卡片拖到右侧完成连线。</p>

      <section class="board-section" aria-label="匹配区">
        <div class="match-board" id="matchBoard">
          <svg class="lines-layer" id="linesLayer" aria-hidden="true">
            <defs>
              <linearGradient id="perm-line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ff9ec8" />
                <stop offset="45%" stop-color="#c4a7ff" />
                <stop offset="100%" stop-color="#69b1ff" />
              </linearGradient>
              <linearGradient id="temp-line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffb3d9" stop-opacity="0.5" />
                <stop offset="50%" stop-color="#b8a9ff" stop-opacity="0.65" />
                <stop offset="100%" stop-color="#91caff" stop-opacity="0.8" />
              </linearGradient>
              <filter id="line-soft-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur" />
                <feMerge>
                  <feMergeNode in="blur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
          </svg>
          <div class="match-column match-column--policy">
            <h2 class="column-title"><span class="column-badge">左</span>资助政策</h2>
            <ul class="card-list" id="policyList"></ul>
          </div>
          <div class="match-column match-column--audience">
            <h2 class="column-title"><span class="column-badge">右</span>适合对象</h2>
            <ul class="card-list" id="audienceList"></ul>
          </div>
        </div>
      </section>

      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="celebration-layer" id="celebrationLayer" hidden aria-hidden="true">
        <canvas class="fireworks-canvas" id="fireworksCanvas" aria-hidden="true"></canvas>
        <p class="celebration-message" id="celebrationMessage">全部匹配正确！</p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
