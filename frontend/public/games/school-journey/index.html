<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>上学路上的补给站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="上学路上的补给站">
      <header class="top-bar">
        <h1>上学路上的补给站</h1>
        <div class="status-panel" aria-label="游戏状态">
          <div class="counter" id="counter" aria-live="polite">小学站 0/2</div>
          <button class="reset-button" id="resetButton" type="button">重玩</button>
        </div>
      </header>

      <p class="game-tip">角色从小学一路走到大学，在每个补给站收集正确的资助「补给」。</p>

      <section class="journey-section" aria-label="上学路线">
        <div class="path-track" id="pathTrack"></div>
        <div class="walker" id="walker" aria-hidden="true">🚶</div>
      </section>

      <section class="station-section" aria-label="当前补给站">
        <h2 class="station-title" id="stationTitle">小学站</h2>
        <p class="station-sub" id="stationSub">点击正确的资助补给收入背包</p>
        <ul class="supply-list" id="supplyList"></ul>
      </section>

      <div class="backpack" aria-label="已收集补给">
        <span class="backpack-label">🎒 背包</span>
        <ul class="backpack-list" id="backpackList"></ul>
      </div>

      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="celebration-layer" id="celebrationLayer" hidden aria-hidden="true">
        <canvas class="fireworks-canvas" id="fireworksCanvas" aria-hidden="true"></canvas>
        <p class="celebration-message">顺利抵达大学，补给齐全！</p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
