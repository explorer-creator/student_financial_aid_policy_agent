<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资助小邮差</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="资助小邮差">
      <header class="top-bar">
        <h1>资助小邮差</h1>
        <div class="status-panel" aria-label="游戏状态">
          <div class="counter" id="counter" aria-live="polite">0/4</div>
          <button class="reset-button" id="resetButton" type="button">重玩</button>
        </div>
      </header>

      <p class="game-tip">把「政策信件」拖到正确的学校门口；也可先点信件再点校门。</p>

      <section class="letters-section" aria-label="待投递信件">
        <h2 class="section-title">📬 邮包里的信件</h2>
        <ul class="letter-list" id="letterList"></ul>
      </section>

      <section class="schools-section" aria-label="学校门口">
        <h2 class="section-title">🏫 学校门口</h2>
        <div class="school-grid" id="schoolGrid"></div>
      </section>

      <p class="feedback" id="feedback" aria-live="polite"></p>

      <div class="celebration-layer" id="celebrationLayer" hidden aria-hidden="true">
        <canvas class="fireworks-canvas" id="fireworksCanvas" aria-hidden="true"></canvas>
        <p class="celebration-message">全部投递正确！</p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
